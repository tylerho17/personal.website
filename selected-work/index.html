<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selected work — tyler ho</title>
    <meta name="description" content="selected work by tyler ho — tools, studies, and experiments. coding projects coming in.">
    <meta property="og:title" content="selected work — tyler ho">
    <meta property="og:description" content="tools, studies, and experiments. coding projects coming in.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #fefdfb;
            color: #3a3530;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* ─── header ─── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .logo {
            font-size: 14px;
            font-weight: 400;
            color: #3a3530;
            pointer-events: auto;
            cursor: pointer;
            text-decoration: none;
        }

        .hamburger {
            width: 30px; height: 20px;
            display: flex; flex-direction: column;
            justify-content: space-between;
            background: none; border: none;
            cursor: pointer; padding: 0;
            pointer-events: auto;
        }
        .hamburger span {
            width: 100%; height: 1px;
            background-color: #3a3530;
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        /* ─── the index — an archive drawer, not a menu ─── */
        nav {
            position: fixed;
            top: 0; right: -320px;
            width: 320px; height: 100vh;
            background-color: #fefdfb;
            padding: 100px 44px 44px;
            z-index: 99;
            transition: right 0.45s ease;
            border-left: 1px solid #ede8e2;
            overflow-y: auto;
        }
        nav.active { right: 0; }
        .menu-title {
            font-size: 10px;
            color: #b8b0a8;
            letter-spacing: 0.14em;
            margin-bottom: 26px;
        }
        .index-row {
            display: flex;
            align-items: baseline;
            gap: 16px;
            padding: 9px 0;
            text-decoration: none;
        }
        .index-num {
            font-size: 10px;
            letter-spacing: 0.08em;
            color: #8d99ab;
            width: 18px;
            flex-shrink: 0;
        }
        .index-name {
            display: block;
            font-size: 14px;
            color: #3a3530;
            transition: color 0.2s;
        }
        .index-sub {
            display: block;
            font-size: 10px;
            color: #b8b0a8;
            margin-top: 1px;
        }
        .index-row:hover .index-name { color: #46586e; }
        .menu-materials-label {
            margin-top: 44px;
            padding-top: 18px;
            border-top: 1px solid #ede8e2;
            font-size: 10px;
            color: #b8b0a8;
            letter-spacing: 0.12em;
        }
        .menu-materials {
            font-size: 11px;
            color: #b8b0a8;
            margin-top: 8px;
            line-height: 1.7;
        }

        /* ─── the reserved room ─── */
        main {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 40px 80px;
            animation: fadeUp 0.7s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .room-eyebrow {
            font-size: 11px;
            color: #b8b0a8;
            letter-spacing: 0.09em;
            margin-bottom: 18px;
        }

        .room-rule {
            width: 24px;
            height: 1px;
            background: #d9d3cc;
            margin: 0 auto 18px;
        }

        .room-line {
            font-size: 14px;
            color: #3a3530;
            margin-bottom: 8px;
        }

        .room-sub {
            font-size: 12px;
            color: #b8b0a8;
        }

        @media (max-width: 640px) {
            header { padding: 28px 24px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<header>
    <a class="logo" href="/">tyler ho</a>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="menu">
        <span></span><span></span><span></span>
    </button>
</header>

<nav id="menu" aria-label="index">
    <div class="menu-title">index</div>

    <a class="index-row" href="/" onclick="closeMenu()">
        <span class="index-num">01</span>
        <span><span class="index-name">letter</span><span class="index-sub">home</span></span>
    </a>
    <a class="index-row" href="/archive/" onclick="closeMenu()">
        <span class="index-num">02</span>
        <span><span class="index-name">photographs</span><span class="index-sub">archive</span></span>
    </a>
    <a class="index-row" href="/field-notes/" onclick="closeMenu()">
        <span class="index-num">03</span>
        <span><span class="index-name">notes</span><span class="index-sub">field notes</span></span>
    </a>
    <a class="index-row" href="/selected-work/" onclick="closeMenu()">
        <span class="index-num">04</span>
        <span><span class="index-name">work</span><span class="index-sub">selected work</span></span>
    </a>

    <div class="menu-materials-label">materials</div>
    <div class="menu-materials">photographs · notes · people · places · work</div>
</nav>

<main>
    <div class="room-eyebrow">selected work</div>
    <div class="room-rule"></div>
    <div class="room-line">coding projects coming in.</div>
    <div class="room-sub">tools, studies, and experiments will live here soon.</div>
</main>

<script>
function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
    document.getElementById('hamburger').classList.toggle('active');
}
function closeMenu() {
    document.getElementById('menu').classList.remove('active');
    document.getElementById('hamburger').classList.remove('active');
}
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMenu();
});
document.addEventListener('click', e => {
    const menu = document.getElementById('menu');
    if (!menu.classList.contains('active')) return;
    if (!menu.contains(e.target) && !e.target.closest('.hamburger')) closeMenu();
});
</script>
</body>
</html>
