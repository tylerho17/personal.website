/* =============================================================
   RENDER — chronological gallery wall, uniform film-still cards.
   the CSS grid handles layout (5 / 4 / 2 columns by viewport),
   so render runs once and never needs to re-run on resize.
============================================================= */
function render() {
    const canvas = document.getElementById('archiveCanvas');
    canvas.innerHTML = '';
    archiveItems.forEach(item => canvas.appendChild(buildStill(item)));
    observeCards();
}

function buildStill(item) {
    const card = document.createElement('div');
    card.className = 'polaroid';
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', `${item.title}, ${item.date}`);

    const wrap = document.createElement('div');
    wrap.className = 'polaroid-photo-wrap';

    const img = document.createElement('img');
    img.className = 'polaroid-photo';
    img.src = item.thumb;
    img.alt = item.alt || '';
    img.loading = 'lazy';
    img.decoding = 'async';
    img.width = 560;
    img.height = 560;
    // thumbnail missing → fall back to the original, then to a placeholder
    img.onerror = function () {
        if (this.src.indexOf('/thumbs/') !== -1) {
            this.src = item.image;
            return;
        }
        this.style.display = 'none';
        const fallback = document.createElement('div');
        fallback.className = 'polaroid-fallback';
        fallback.textContent = item.title || '';
        wrap.appendChild(fallback);
    };

    const hoverCap = document.createElement('div');
    hoverCap.className = 'polaroid-hover-cap';
    hoverCap.textContent = item.shortCaption || '';

    wrap.appendChild(img);
    wrap.appendChild(hoverCap);

    const caption = document.createElement('div');
    caption.className = 'polaroid-caption';
    caption.innerHTML = `
        <div class="polaroid-num">${item.num}</div>
        <div class="polaroid-title">${item.title}</div>
        <div class="polaroid-date">${item.date}</div>
        ${item.location ? `<div class="polaroid-loc">${item.location}</div>` : ''}
    `;

    card.appendChild(wrap);
    card.appendChild(caption);

    card.addEventListener('click', () => openModal(item));
    card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openModal(item);
        }
    });

    return card;
}

/* soft fade-in as cards enter the viewport */
let _observer;
function observeCards() {
    if (_observer) _observer.disconnect();
    if (!('IntersectionObserver' in window)) {
        document.querySelectorAll('.polaroid').forEach(c => c.classList.add('in-view'));
        return;
    }
    _observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('in-view');
                _observer.unobserve(entry.target);
            }
        });
    }, { rootMargin: '60px' });
    document.querySelectorAll('.polaroid').forEach(c => _observer.observe(c));
}

/* =============================================================
   MODAL
============================================================= */
let activeIndex = 0;
let cardFlipped = false;

function openModal(item) {
    activeIndex = archiveItems.findIndex(a => a.id === item.id);
    cardFlipped = false;
    document.getElementById('flipCard').classList.remove('flipped');
    populateModal(item);
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function populateModal(item) {
    const photo = document.getElementById('mPhoto');
    photo.src = item.image; // full-quality original in the detail view
    photo.alt = item.alt || '';

    document.getElementById('mNum').textContent      = item.num;
    document.getElementById('mTitle').textContent    = item.title || '';
    document.getElementById('mDate').textContent     = item.date || '';
    document.getElementById('mLoc').textContent      = item.location || '';
    document.getElementById('mShort').textContent    = item.shortCaption || '';
    document.getElementById('bNum').textContent      = 'no. ' + item.num;
    document.getElementById('bChapter').textContent  = item.chapter || '';
    document.getElementById('bStory').textContent    = item.expandedCaption || '';
    document.getElementById('bMeaning').textContent  = item.meaning || '';
    document.getElementById('mCounter').textContent  = `${item.num} / ${String(archiveItems.length).padStart(3, '0')}`;
    document.getElementById('prevBtn').disabled      = activeIndex === 0;
    document.getElementById('nextBtn').disabled      = activeIndex === archiveItems.length - 1;

    preloadNeighbors();
}

function preloadNeighbors() {
    [activeIndex - 1, activeIndex + 1].forEach(i => {
        if (i >= 0 && i < archiveItems.length) {
            const pre = new Image();
            pre.src = archiveItems[i].image;
        }
    });
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
    cardFlipped = false;
    document.getElementById('flipCard').classList.remove('flipped');
}

function flipCard() {
    cardFlipped = !cardFlipped;
    document.getElementById('flipCard').classList.toggle('flipped', cardFlipped);
}

function navigate(dir) {
    const next = activeIndex + dir;
    if (next < 0 || next >= archiveItems.length) return;
    activeIndex = next;
    cardFlipped = false;

    const card = document.getElementById('flipCard');
    card.classList.remove('flipped');
    card.style.opacity = '0';
    card.style.transition = 'opacity 0.15s ease';

    setTimeout(() => {
        populateModal(archiveItems[activeIndex]);
        card.style.opacity = '1';
        // restore flip transition after fade
        setTimeout(() => {
            card.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.2,1)';
        }, 160);
    }, 140);
}

function onOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
}

/* =============================================================
   KEYBOARD + SWIPE
============================================================= */
document.addEventListener('keydown', e => {
    // escape closes the index drawer first if it is open
    if (e.key === 'Escape' && document.getElementById('menu').classList.contains('active')) {
        closeMenu();
        return;
    }
    if (!document.getElementById('modalOverlay').classList.contains('active')) return;
    if (e.key === 'Escape')      closeModal();
    if (e.key === 'ArrowRight')  navigate(1);
    if (e.key === 'ArrowLeft')   navigate(-1);
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

// clicking outside the index closes it
document.addEventListener('click', e => {
    const menu = document.getElementById('menu');
    if (!menu.classList.contains('active')) return;
    if (!menu.contains(e.target) && !e.target.closest('.hamburger')) closeMenu();
});

let swipeX = 0;
const overlay = document.getElementById('modalOverlay');
overlay.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive: true });
overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeX;
    if (Math.abs(dx) > 52) navigate(dx < 0 ? 1 : -1);
}, { passive: true });

/* =============================================================
   NAV
============================================================= */
function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
    document.getElementById('hamburger').classList.toggle('active');
}
function closeMenu() {
    document.getElementById('menu').classList.remove('active');
    document.getElementById('hamburger').classList.remove('active');
}

/* =============================================================
   INIT
============================================================= */
function setPageMeta() {
    const first = archiveItems[0].sortDate.slice(0, 4);
    const last  = archiveItems[archiveItems.length - 1].sortDate.slice(0, 4);
    document.getElementById('pageMeta').textContent =
        `${archiveItems.length} photographs · ${first} – ${last}`;
}

setPageMeta();
render();
</script>
