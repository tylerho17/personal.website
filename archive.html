<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive — Tyler Ho</title>
    <style>
        /* ─── reset ─── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #fefdfb;
            color: #3a3530;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ─── header ─── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            pointer-events: none;
        }

        .logo {
            font-size: 14px;
            font-weight: 400;
            color: #3a3530;
            pointer-events: auto;
            cursor: pointer;
            text-decoration: none;
        }

        .hamburger {
            width: 30px; height: 20px;
            display: flex; flex-direction: column;
            justify-content: space-between;
            background: none; border: none;
            cursor: pointer; padding: 0;
            pointer-events: auto;
        }
        .hamburger span {
            width: 100%; height: 1px;
            background-color: #3a3530;
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        /* ─── nav drawer ─── */
        nav {
            position: fixed;
            top: 0; right: -300px;
            width: 300px; height: 100vh;
            background-color: #fefdfb;
            padding: 100px 40px 40px;
            z-index: 199;
            transition: right 0.3s ease;
            border-left: 1px solid #ede8e2;
        }
        nav.active { right: 0; }
        nav a {
            display: block; font-size: 14px;
            color: #3a3530; text-decoration: none;
            margin-bottom: 8px; font-weight: 400;
            transition: opacity 0.2s;
        }
        nav a:hover { opacity: 0.6; }
        .menu-caption {
            font-size: 11px; color: #b8b0a8;
            margin-bottom: 24px; line-height: 1.4;
        }

        /* ─── page intro ─── */
        .page-header {
            padding: 104px 40px 16px;
        }
        .page-eyebrow {
            font-size: 11px;
            color: #b8b0a8;
            letter-spacing: 0.09em;
            margin-bottom: 5px;
        }
        .page-desc {
            font-size: 12px;
            color: #7a7070;
            line-height: 1.6;
            max-width: 400px;
        }

        /* ─── archive canvas ─── */
        .archive-canvas {
            padding: 0 32px 80px;
        }

        /* ─── polaroid row ─── */
        .polaroid-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        /* ─── polaroid card ─── */
        .polaroid {
            background: #faf8f4;
            padding: 8px 8px 26px;
            box-shadow:
                0 1px 3px rgba(58,53,48,0.07),
                0 4px 16px rgba(58,53,48,0.09),
                0 12px 40px rgba(58,53,48,0.06);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: box-shadow 0.28s ease;
        }
        /* The hover lift is set in JS to preserve individual rotation */
        .polaroid-photo {
            display: block;
            width: 100%;
            object-fit: cover;
            background: #e4dfd8;
        }
        .polaroid-photo.square   { aspect-ratio: 1 / 1; }
        .polaroid-fallback {
            aspect-ratio: 1 / 1;
            width: 100%;
            background: #ede8e2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #b8b0a8;
            text-align: center;
            padding: 8px;
        }
        .polaroid-photo.portrait { aspect-ratio: 3 / 4; }
        .polaroid-photo.landscape { aspect-ratio: 4 / 3; }

        .polaroid-caption {
            padding-top: 7px;
        }
        .polaroid-date {
            font-size: 9.5px;
            color: #7a7070;
            font-weight: 400;
        }
        .polaroid-loc {
            font-size: 9.5px;
            color: #b8b0a8;
            margin-top: 1px;
        }

        /* ─── modal overlay ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 23, 20, 0.78);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ─── flip card ─── */
        .flip-wrapper {
            width: min(460px, 88vw);
            perspective: 1400px;
            position: relative;
        }
        .flip-card {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .flip-card.flipped { transform: rotateY(180deg); }

        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: #faf8f4;
        }
        .card-front {
            padding: 16px 16px 44px;
            box-shadow:
                0 2px 8px rgba(26,23,20,0.12),
                0 16px 60px rgba(26,23,20,0.28),
                0 40px 100px rgba(26,23,20,0.18);
        }
        .card-back {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotateY(180deg);
            overflow-y: auto;
            padding: 36px 36px 44px;
            box-shadow:
                0 2px 8px rgba(26,23,20,0.12),
                0 16px 60px rgba(26,23,20,0.28),
                0 40px 100px rgba(26,23,20,0.18);
        }

        .card-img {
            display: block;
            width: 100%;
            object-fit: cover;
            background: #e4dfd8;
        }
        .card-img.square   { aspect-ratio: 1 / 1; }
        .card-img.portrait { aspect-ratio: 3 / 4; }
        .card-img.landscape { aspect-ratio: 4 / 3; }

        .card-front-meta { padding-top: 14px; }
        .card-title {
            font-size: 13px;
            color: #3a3530;
            margin-bottom: 3px;
        }
        .card-date {
            font-size: 11px;
            color: #7a7070;
        }
        .card-loc {
            font-size: 11px;
            color: #b8b0a8;
            margin-top: 1px;
        }
        .flip-hint {
            font-size: 10px;
            color: #c4bdb5;
            letter-spacing: 0.07em;
            margin-top: 14px;
        }

        /* back face */
        .back-header {
            font-size: 10px;
            color: #c4bdb5;
            letter-spacing: 0.12em;
            margin-bottom: 28px;
            border-bottom: 1px solid #ede8e2;
            padding-bottom: 14px;

        .back-field { margin-bottom: 22px; }
        .back-key {

            letter-spacing: 0.1em;
            margin-bottom: 5px;

/* =============================================================
   LAYOUT CONFIG
   Each row config defines [n] slot objects:
     rot   – CSS rotation in degrees
     mt    – margin-top in px (vertical stagger)
     ml    – margin-left (CSS string, e.g. "6%")
     wFrac – card width as fraction of archive-canvas width
============================================================= */
const ROW_TEMPLATES = [
    // 5-up default
    [
        { rot: -1.4, mt: 4, ml: '0.5%', wFrac: 0.168 },
        { rot:  1.1, mt: 0, ml: '1%',   wFrac: 0.162 },
        { rot: -0.7, mt: 6, ml: '1%',   wFrac: 0.167 },
        { rot:  1.6, mt: 2, ml: '1%',   wFrac: 0.162 },
        { rot: -1.0, mt: 5, ml: '1%',   wFrac: 0.165 },
    ],
    // 5-up alternate
    [
        { rot:  1.2, mt: 0, ml: '0.5%', wFrac: 0.165 },
        { rot: -1.6, mt: 5, ml: '1%',   wFrac: 0.162 },
        { rot:  0.5, mt: 2, ml: '1%',   wFrac: 0.168 },
        { rot: -1.1, mt: 4, ml: '1%',   wFrac: 0.162 },
        { rot:  1.8, mt: 1, ml: '1%',   wFrac: 0.165 },
    ],
    // 5-up tighter stagger
    [
        { rot: -1.8, mt: 2, ml: '0.5%', wFrac: 0.162 },
        { rot:  1.3, mt: 0, ml: '1%',   wFrac: 0.167 },
        { rot: -0.5, mt: 5, ml: '1%',   wFrac: 0.162 },
        { rot:  1.9, mt: 1, ml: '1%',   wFrac: 0.165 },
        { rot: -1.2, mt: 4, ml: '1%',   wFrac: 0.162 },
    ],
    // 4-up (remainder)
    [
        { rot: -1.2, mt: 4, ml: '1%',   wFrac: 0.175 },
        { rot:  1.5, mt: 0, ml: '1.5%', wFrac: 0.175 },
        { rot: -0.8, mt: 6, ml: '1.5%', wFrac: 0.172 },
        { rot:  1.0, mt: 2, ml: '1.5%', wFrac: 0.172 },
    ],
    // 3-up (remainder)
    [
        { rot: -1.0, mt: 3, ml: '2%',   wFrac: 0.180 },
        { rot:  1.4, mt: 0, ml: '2%',   wFrac: 0.180 },
        { rot: -0.7, mt: 5, ml: '2%',   wFrac: 0.178 },
    ],
    // 2-up (remainder)
    [
        { rot:  0.9, mt: 0, ml: '2%',   wFrac: 0.182 },
        { rot: -1.3, mt: 4, ml: '2%',   wFrac: 0.180 },
    ],
    // 1-up (remainder)
    [
        { rot: -0.8, mt: 2, ml: '2%',   wFrac: 0.185 },
    ],
];

/* =============================================================
   RENDER — continuous 5-per-row grid, no year dividers
============================================================= */
function render() {
    const canvas = document.getElementById('archiveCanvas');
    canvas.innerHTML = '';

    const ROW_SIZE = 5;
    const rows = [];
    for (let i = 0; i < archiveItems.length; i += ROW_SIZE) {
        rows.push(archiveItems.slice(i, i + ROW_SIZE));
    }

    rows.forEach((rowItems, rIdx) => {
        const count = rowItems.length;
        let tpl;
        if      (count >= 5) tpl = ROW_TEMPLATES[rIdx % 3];
        else if (count === 4) tpl = ROW_TEMPLATES[3];
        else if (count === 3) tpl = ROW_TEMPLATES[4];
        else if (count === 2) tpl = ROW_TEMPLATES[5];
        else                  tpl = ROW_TEMPLATES[6];

        canvas.appendChild(buildRow(rowItems, tpl));
    });
}

function buildRow(items, tpl) {
    const row = document.createElement('div');
    row.className = 'polaroid-row';

    const canvasW = document.getElementById('archiveCanvas').offsetWidth || 900;

    items.forEach((item, j) => {
        const slot = tpl[j] || tpl[tpl.length - 1];
        const w = Math.max(90, Math.min(210, Math.round(canvasW * slot.wFrac)));
        const card = buildPolaroid(item, slot, w);
        row.appendChild(card);
    });

    return row;
}

function buildPolaroid(item, slot, w) {
    const card = document.createElement('div');
    card.className = 'polaroid';
    card.style.width = w + 'px';
    card.style.marginTop = slot.mt + 'px';
    card.style.marginLeft = slot.ml;
    card.style.transform = `rotate(${slot.rot}deg)`;

    const img = document.createElement('img');
    img.className = 'polaroid-photo square'; // always square in grid
    img.src = item.image;
    img.alt = item.alt || '';
    img.loading = 'lazy';
    img.decoding = 'async';
    img.onerror = function() {
        this.style.display = 'none';
        const fallback = document.createElement('div');
        fallback.className = 'polaroid-fallback';
        fallback.textContent = item.title || '';
        card.insertBefore(fallback, this.nextSibling);
    };

    const caption = document.createElement('div');
    caption.className = 'polaroid-caption';
    caption.innerHTML = `
        <div class="polaroid-date">${item.date}</div>
        ${item.location ? `<div class="polaroid-loc">${item.location}</div>` : ''}
    `;

    card.appendChild(img);
    card.appendChild(caption);

    // hover lift preserving rotation
    card.addEventListener('mouseenter', () => {
        card.style.transform = `rotate(${slot.rot}deg) translateY(-7px)`;
        card.style.zIndex = '10';
        card.style.boxShadow = '0 2px 6px rgba(58,53,48,0.08), 0 12px 40px rgba(58,53,48,0.14), 0 24px 60px rgba(58,53,48,0.08)';
    });
    card.addEventListener('mouseleave', () => {
        card.style.transform = `rotate(${slot.rot}deg)`;
        card.style.zIndex = '';
        card.style.boxShadow = '';
    });

    card.addEventListener('click', () => openModal(item));

    return card;
}

/* =============================================================

============================================================= */
let activeIndex = 0;
let cardFlipped = false;

function openModal(item) {
    activeIndex = archiveItems.findIndex(a => a.id === item.id);
    cardFlipped = false;
    document.getElementById('flipCard').classList.remove('flipped');
    populateModal(item);
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function populateModal(item) {
    const photo = document.getElementById('mPhoto');
    photo.src = item.image;
    photo.alt = item.alt || '';
    photo.className = `card-img ${item.aspect}`;

    document.getElementById('mTitle').textContent    = item.title || '';
    document.getElementById('mDate').textContent     = item.date;
    document.getElementById('mLoc').textContent      = item.location || '';
    document.getElementById('bWhat').textContent     = item.whatItIs;
    document.getElementById('bMeaning').textContent  = item.meaning;
    document.getElementById('bReflection').textContent = item.reflection;
    document.getElementById('mCounter').textContent  = `${activeIndex + 1} / ${archiveItems.length}`;
    document.getElementById('prevBtn').disabled      = activeIndex === 0;
    document.getElementById('nextBtn').disabled      = activeIndex === archiveItems.length - 1;
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
    cardFlipped = false;
    document.getElementById('flipCard').classList.remove('flipped');
}

function flipCard() {
    cardFlipped = !cardFlipped;
    document.getElementById('flipCard').classList.toggle('flipped', cardFlipped);
}

function navigate(dir) {
    const next = activeIndex + dir;
    if (next < 0 || next >= archiveItems.length) return;
    activeIndex = next;
    cardFlipped = false;

    const card = document.getElementById('flipCard');
    card.classList.remove('flipped');
    card.style.opacity = '0';
    card.style.transition = 'opacity 0.15s ease';

    setTimeout(() => {
        populateModal(archiveItems[activeIndex]);
        card.style.opacity = '1';
        // restore flip transition after fade
        setTimeout(() => {
            card.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.2,1)';
        }, 160);
    }, 140);
}

function onOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
}

/* =============================================================
   KEYBOARD + SWIPE
============================================================= */
document.addEventListener('keydown', e => {
    if (!document.getElementById('modalOverlay').classList.contains('active')) return;
    if (e.key === 'Escape')      closeModal();
    if (e.key === 'ArrowRight')  navigate(1);
    if (e.key === 'ArrowLeft')   navigate(-1);
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

let swipeX = 0;
const overlay = document.getElementById('modalOverlay');
overlay.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive: true });
overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeX;
    if (Math.abs(dx) > 52) navigate(dx < 0 ? 1 : -1);
}, { passive: true });

/* =============================================================
   NAV
============================================================= */
function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
    document.getElementById('hamburger').classList.toggle('active');
}
function closeMenu() {
    document.getElementById('menu').classList.remove('active');
    document.getElementById('hamburger').classList.remove('active');
}

/* =============================================================
   INIT
============================================================= */
let _rendering = false;
function safeRender() {
    if (_rendering) return;
    _rendering = true;
    render();
    _rendering = false;
}

safeRender();

let _resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(safeRender, 120);
});
</script>
</body>
